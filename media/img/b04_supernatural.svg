<svg xmlns="http://www.w3.org/2000/svg" width="75" height="75" viewBox="0 0 75 75">
  <defs>
    <radialGradient id="g1" cx="50%" cy="10%" r="80%">
      <stop offset="0%" stop-color="rgba(80,60,220,0.30)"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
    <radialGradient id="g2" cx="90%" cy="90%" r="80%">
      <stop offset="0%" stop-color="rgba(0,100,200,0.18)"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="clip">
      <rect width="75" height="75" rx="6" ry="6"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="75" height="75" rx="6" ry="6" fill="#030510"/>

  <g clip-path="url(#clip)">
    <!-- Glow overlays -->
    <rect width="75" height="75" fill="url(#g1)"/>
    <rect width="75" height="75" fill="url(#g2)"/>

    <!-- Animated sparkle dots -->
    
    <circle cx="11" cy="7" r="1.0" fill="#aabbff">
      <animate attributeName="opacity" values="0.1;0.9;0.1" dur="2.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="66" cy="15" r="0.5" fill="white">
      <animate attributeName="opacity" values="0.1;0.9;0.1" dur="1.7s" repeatCount="indefinite"/>
    </circle>
    <circle cx="7" cy="56" r="1.0" fill="#8899ff">
      <animate attributeName="opacity" values="0.1;0.9;0.1" dur="3.1s" repeatCount="indefinite"/>
    </circle>
    <circle cx="19" cy="21" r="0.5" fill="#aabbff">
      <animate attributeName="opacity" values="0.1;0.9;0.1" dur="2.2s" repeatCount="indefinite"/>
    </circle>

    <!-- Icon -->
    <text x="37.5" y="46" font-size="24" text-anchor="middle" 
          dominant-baseline="middle" filter="url(#glow)">🌙</text>

    <!-- Label -->
    
    <text x="37.5" y="61" font-family="Cormorant Garamond, Georgia, serif" font-weight="600" font-size="6.5" 
          letter-spacing="1.2" fill="#aabbff" text-anchor="middle">SUPERNATURAL</text>

    <!-- Rule -->
    <line x1="28.5" y1="69" x2="46.5" y2="69" 
          stroke="rgba(100,120,255,0.6)" stroke-width="0.8" stroke-linecap="round"/>
  </g>

  <!-- Border -->
  <rect width="75" height="75" rx="6" ry="6" 
        fill="none" stroke="rgba(100,120,255,0.25)" stroke-width="1"/>
</svg>