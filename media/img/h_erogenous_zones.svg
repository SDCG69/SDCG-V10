<svg xmlns="http://www.w3.org/2000/svg" width="75" height="75" viewBox="0 0 75 75">
  <defs>
    <radialGradient id="g1" cx="55%" cy="10%" r="80%">
      <stop offset="0%" stop-color="rgba(50,180,150,0.26)"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
    <radialGradient id="g2" cx="5%" cy="90%" r="80%">
      <stop offset="0%" stop-color="rgba(20,120,90,0.20)"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="clip">
      <rect width="75" height="75" rx="6" ry="6"/>
    </clipPath>
  </defs>

  <rect width="75" height="75" rx="6" ry="6" fill="#060a09"/>

  <g clip-path="url(#clip)">
    <rect width="75" height="75" fill="url(#g1)"/>
    <rect width="75" height="75" fill="url(#g2)"/>

    <circle cx="10" cy="8" r="1.0" fill="#55ddbb">
      <animate attributeName="opacity" values="0.1;0.9;0.1" dur="2.4s" repeatCount="indefinite"/>
    </circle>
    <circle cx="64" cy="17" r="0.5" fill="#55ddbb">
      <animate attributeName="opacity" values="0.1;0.9;0.1" dur="3.0s" repeatCount="indefinite"/>
    </circle>
    <circle cx="9" cy="56" r="1.0" fill="#55ddbb">
      <animate attributeName="opacity" values="0.1;0.9;0.1" dur="2.9s" repeatCount="indefinite"/>
    </circle>
    <circle cx="67" cy="7" r="0.5" fill="#55ddbb">
      <animate attributeName="opacity" values="0.1;0.9;0.1" dur="1.8s" repeatCount="indefinite"/>
    </circle>

    <text x="37.5" y="44" font-size="24" text-anchor="middle"
          dominant-baseline="middle" filter="url(#glow)">✨</text>

    <text x="37.5" y="58" font-family="Cormorant Garamond, Georgia, serif" font-weight="600" font-size="5.5"
          letter-spacing="1.2" fill="#66ddbb" text-anchor="middle">EROGENOUS</text>
    <text x="37.5" y="65" font-family="Cormorant Garamond, Georgia, serif" font-weight="600" font-size="5.5"
          letter-spacing="1.2" fill="#66ddbb" text-anchor="middle">ZONES</text>
    <line x1="26" y1="70" x2="49" y2="70"
          stroke="rgba(50,180,140,0.6)" stroke-width="0.8" stroke-linecap="round"/>
  </g>

  <rect width="75" height="75" rx="6" ry="6"
        fill="none" stroke="rgba(50,180,140,0.28)" stroke-width="1"/>
</svg>
