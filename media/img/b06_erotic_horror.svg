<svg xmlns="http://www.w3.org/2000/svg" width="75" height="75" viewBox="0 0 75 75">
  <defs>
    <radialGradient id="g1" cx="50%" cy="15%" r="80%">
      <stop offset="0%" stop-color="rgba(120,0,180,0.32)"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
    <radialGradient id="g2" cx="100%" cy="100%" r="80%">
      <stop offset="0%" stop-color="rgba(160,0,80,0.20)"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="clip">
      <rect width="75" height="75" rx="6" ry="6"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="75" height="75" rx="6" ry="6" fill="#060308"/>

  <g clip-path="url(#clip)">
    <!-- Glow overlays -->
    <rect width="75" height="75" fill="url(#g1)"/>
    <rect width="75" height="75" fill="url(#g2)"/>

    <!-- Animated sparkle dots -->
    
    <circle cx="10" cy="8" r="1.0" fill="#cc44ff">
      <animate attributeName="opacity" values="0.1;0.9;0.1" dur="2.4s" repeatCount="indefinite"/>
    </circle>
    <circle cx="63" cy="18" r="0.5" fill="#ee88ff">
      <animate attributeName="opacity" values="0.1;0.9;0.1" dur="3.3s" repeatCount="indefinite"/>
    </circle>
    <circle cx="8" cy="57" r="1.0" fill="#aa00cc">
      <animate attributeName="opacity" values="0.1;0.9;0.1" dur="2.0s" repeatCount="indefinite"/>
    </circle>
    <circle cx="68" cy="7" r="0.5" fill="#cc44ff">
      <animate attributeName="opacity" values="0.1;0.9;0.1" dur="1.6s" repeatCount="indefinite"/>
    </circle>

    <!-- Icon -->
    <text x="37.5" y="44" font-size="24" text-anchor="middle" 
          dominant-baseline="middle" filter="url(#glow)">🕷</text>

    <!-- Label -->
    
    <text x="37.5" y="58" font-family="Cormorant Garamond, Georgia, serif" font-weight="600" font-size="6.5" 
          letter-spacing="1.2" fill="#d088ff" text-anchor="middle">EROTIC</text>
    <text x="37.5" y="65.5" font-family="Cormorant Garamond, Georgia, serif" font-weight="600" font-size="6.5" 
          letter-spacing="1.2" fill="#d088ff" text-anchor="middle">HORROR</text>

    <!-- Rule -->
    <line x1="28.5" y1="70" x2="46.5" y2="70" 
          stroke="rgba(150,0,220,0.6)" stroke-width="0.8" stroke-linecap="round"/>
  </g>

  <!-- Border -->
  <rect width="75" height="75" rx="6" ry="6" 
        fill="none" stroke="rgba(140,0,200,0.32)" stroke-width="1"/>
</svg>