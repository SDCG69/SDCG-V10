<svg xmlns="http://www.w3.org/2000/svg" width="75" height="75" viewBox="0 0 75 75">
  <defs>
    <radialGradient id="g1" cx="50%" cy="0%" r="80%">
      <stop offset="0%" stop-color="rgba(255,120,40,0.25)"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
    <radialGradient id="g2" cx="0%" cy="100%" r="80%">
      <stop offset="0%" stop-color="rgba(200,60,20,0.18)"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="clip">
      <rect width="75" height="75" rx="6" ry="6"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="75" height="75" rx="6" ry="6" fill="#0a0608"/>

  <g clip-path="url(#clip)">
    <!-- Glow overlays -->
    <rect width="75" height="75" fill="url(#g1)"/>
    <rect width="75" height="75" fill="url(#g2)"/>

    <!-- Animated sparkle dots -->
    
    <circle cx="10" cy="9" r="1.0" fill="#ffaa44">
      <animate attributeName="opacity" values="0.1;0.9;0.1" dur="2.2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="63" cy="16" r="0.5" fill="#ffcc88">
      <animate attributeName="opacity" values="0.1;0.9;0.1" dur="3.1s" repeatCount="indefinite"/>
    </circle>
    <circle cx="65" cy="57" r="1.0" fill="#ff8833">
      <animate attributeName="opacity" values="0.1;0.9;0.1" dur="2.7s" repeatCount="indefinite"/>
    </circle>
    <circle cx="67" cy="8" r="0.5" fill="#ffaa44">
      <animate attributeName="opacity" values="0.1;0.9;0.1" dur="1.9s" repeatCount="indefinite"/>
    </circle>

    <!-- Icon -->
    <text x="37.5" y="46" font-size="24" text-anchor="middle" 
          dominant-baseline="middle" filter="url(#glow)">👥</text>

    <!-- Label -->
    
    <text x="37.5" y="61" font-family="Cormorant Garamond, Georgia, serif" font-weight="600" font-size="6.5" 
          letter-spacing="1.2" fill="#ffb87a" text-anchor="middle">GROUP</text>

    <!-- Rule -->
    <line x1="28.5" y1="69" x2="46.5" y2="69" 
          stroke="rgba(255,130,50,0.6)" stroke-width="0.8" stroke-linecap="round"/>
  </g>

  <!-- Border -->
  <rect width="75" height="75" rx="6" ry="6" 
        fill="none" stroke="rgba(255,140,60,0.28)" stroke-width="1"/>
</svg>